<body>
        <div id="conteudo">

        <div id="formulario">
            <h2>Adicionar servicos</h2>

            <input type="text" id="nomeServico" placeholder="Nome do servico">

            <input type="number" id="precoServico" placeholder="Preco">

            <button id="adicionarServico">Adicionar</button>
            
            <span id="erroNomePreco" class="erroServico">Erro: Nome e preco sao obrigatorios!</span>
        </div>

        <div id="listaServicos"></div>

        <div id="modalServico">
            <div id="conteudoModal">

                <input type="text" placeholder="Nome" id="nomeModal">
                <input type="text" placeholder="Preco" id="precoModal">

                <button id="btnAalvarModal" onclick="salvarModal()">Salvar</button>
                <button id="btnCancelarModal" onclick="cancelarModal()">Cancelar</button>

            </div>
        </div>
